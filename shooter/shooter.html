<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>星际射击</title>
<!-- 样式区域：定义游戏界面、UI元素和覆盖层的样式 -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* 页面居中显示，深色太空背景 */
  body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  /* 画布边框和发光效果 */
  canvas { border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 40px rgba(0,150,255,0.3); }
  /* 顶部UI信息栏（得分、生命、波数） */
  #ui { position: absolute; top: 20px; color: #fff; text-align: center; pointer-events: none; width: 100%; }
  #score { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #0af; }
  #lives { font-size: 18px; margin-top: 6px; color: #f55; }
  #level { font-size: 16px; margin-top: 4px; color: #0f8; }
  /* 覆盖层：开始界面和游戏结束界面 */
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.75); color: #fff; z-index: 10;
  }
  #overlay h1 { font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px #0af; }
  #overlay h2 { font-size: 28px; margin-bottom: 20px; color: #f55; }
  #overlay p { font-size: 16px; color: #aaa; margin: 4px 0; }
  /* 开始按钮：渐变蓝色，悬停放大效果 */
  #overlay .start-btn {
    margin-top: 30px; padding: 14px 40px; font-size: 20px; cursor: pointer;
    background: linear-gradient(135deg, #0af, #06f); border: none; border-radius: 30px;
    color: #fff; pointer-events: auto; transition: transform 0.2s;
  }
  #overlay .start-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

<!-- 游戏画布 -->
<canvas id="game"></canvas>

<!-- 顶部状态栏 -->
<div id="ui">
  <div id="score">得分: 0</div>
  <div id="lives">❤ ❤ ❤</div>
  <div id="level">第 1 波</div>
</div>

<!-- 开始/结束覆盖层 -->
<div id="overlay">
  <h1>星际射击</h1>
  <p>← → 或 A D 移动</p>
  <p>空格键 射击</p>
  <p>消灭敌人，生存下去！</p>
  <button class="start-btn" id="startBtn">开始游戏</button>
</div>

<!-- 游戏逻辑脚本 -->
<script>
// ==================== 初始化 ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 600, H = 750; // 画布尺寸
canvas.width = W; canvas.height = H;

// 获取DOM元素引用
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');

// ==================== 游戏状态变量 ====================
let player, bullets, enemies, particles, stars, powerUps;
let score, lives, wave, enemySpawnTimer, gameState;
let shootCooldown, shootInterval;
let keys = {}; // 按键状态映射

// ==================== 游戏初始化函数 ====================
function init() {
  // 玩家：位于底部中央，初始火力等级1
  player = { x: W/2, y: H - 60, w: 40, h: 40, speed: 6, power: 1 };
  bullets = []; enemies = []; particles = []; powerUps = [];
  // 生成120颗背景星星，随机位置和速度
  stars = Array.from({length: 120}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    s: Math.random()*2+0.5, sp: Math.random()*2+1
  }));
  score = 0; lives = 3; wave = 1;
  enemySpawnTimer = 0; shootCooldown = 0; shootInterval = 12; // 射击冷却12帧
  gameState = 'playing';
  updateUI();
}

// ==================== UI更新 ====================
function updateUI() {
  scoreEl.textContent = '得分: ' + score;
  livesEl.textContent = '❤ '.repeat(lives).trim();
  levelEl.textContent = '第 ' + wave + ' 波';
}

// ==================== 输入处理 ====================
// 按键按下时记录状态，空格键阻止默认滚动行为
document.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='Space') e.preventDefault(); });
document.addEventListener('keyup', e => keys[e.code] = false);

// ==================== 开始游戏 ====================
document.getElementById('startBtn').addEventListener('click', () => {
  overlay.style.display = 'none';
  init();
  loop();
});

// ==================== 敌人生成 ====================
// 三种敌人类型：小型(红)、中型(橙)、大型(紫)
function spawnEnemy() {
  const types = [
    { w:30, h:30, hp:1, speed:2, color:'#f55', score:10 },   // 小型：1血，速度快，10分
    { w:40, h:40, hp:2, speed:1.5, color:'#fa0', score:25 },  // 中型：2血，速度中，25分
    { w:50, h:50, hp:4, speed:1, color:'#f0f', score:50 },    // 大型：4血，速度慢，50分
  ];
  // 波数越高，出现更强的敌人类型
  let maxType = Math.min(types.length, Math.floor(wave / 2) + 1);
  let t = types[Math.floor(Math.random() * maxType)];
  let ex = Math.random() * (W - t.w);
  // 敌人带有横向摆动和射击能力
  enemies.push({
    x: ex, y: -t.h, w: t.w, h: t.h, hp: t.hp, maxHp: t.hp,
    speed: t.speed + wave * 0.1, color: t.color, score: t.score,
    shootTimer: Math.random() * 120 + 60, // 射击计时器
    sway: Math.random() * 2 - 1, swayPhase: Math.random() * Math.PI * 2 // 摆动参数
  });
}

// ==================== 道具生成 ====================
// 敌人死亡后有15%概率掉落道具
function spawnPowerUp(x, y) {
  if (Math.random() > 0.15) return;
  // 50%概率火力增强，50%概率回血
  powerUps.push({ x, y, w: 20, h: 20, type: Math.random() < 0.5 ? 'power' : 'heal', vy: 1.5 });
}

// ==================== 爆炸粒子效果 ====================
function createExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = Math.random() * 4 + 1;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 30 + Math.random()*20, maxLife: 50, size: Math.random()*3+1, color
    });
  }
}

// ==================== 玩家射击 ====================
// 根据火力等级发射不同弹幕
function shoot() {
  if (shootCooldown > 0) return;
  shootCooldown = shootInterval;
  let bx = player.x, by = player.y - player.h/2;
  if (player.power === 1) {
    // 等级1：单发子弹
    bullets.push({ x: bx, y: by, vx: 0, vy: -8, w: 4, h: 12, color: '#0ff', damage: 1 });
  } else if (player.power === 2) {
    // 等级2：双发子弹
    bullets.push({ x: bx-8, y: by, vx: 0, vy: -8, w: 4, h: 12, color: '#0ff', damage: 1 });
    bullets.push({ x: bx+8, y: by, vx: 0, vy: -8, w: 4, h: 12, color: '#0ff', damage: 1 });
  } else {
    // 等级3：三发扇形弹幕（中间高伤+两侧散射）
    bullets.push({ x: bx, y: by, vx: 0, vy: -8, w: 5, h: 14, color: '#ff0', damage: 2 });
    bullets.push({ x: bx-14, y: by+6, vx: -1, vy: -7.5, w: 4, h: 10, color: '#0ff', damage: 1 });
    bullets.push({ x: bx+14, y: by+6, vx: 1, vy: -7.5, w: 4, h: 10, color: '#0ff', damage: 1 });
  }
}

// ==================== 游戏主更新逻辑 ====================
function update() {
  if (gameState !== 'playing') return;

  // --- 玩家移动（左右键或AD键），限制在画布范围内 ---
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));

  // --- 长按空格连续射击 ---
  if (keys['Space']) shoot();
  if (shootCooldown > 0) shootCooldown--;

  // --- 背景星星向下滚动，超出底部则重置到顶部 ---
  stars.forEach(s => { s.y += s.sp; if (s.y > H) { s.y = 0; s.x = Math.random()*W; } });

  // --- 更新子弹位置，移除出界子弹 ---
  bullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
  bullets = bullets.filter(b => b.y > -20 && b.y < H+20 && b.x > -20 && b.x < W+20);

  // --- 敌人生成：波数越高刷新越快 ---
  enemySpawnTimer--;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = Math.max(20, 60 - wave * 3);
  }

  // --- 波数推进：每200分进入下一波 ---
  if (score > wave * 200) {
    wave++;
    updateUI();
  }

  // --- 更新敌人位置（下移+横向摆动）和敌人射击 ---
  enemies.forEach(e => {
    e.y += e.speed;
    e.swayPhase += 0.03;
    e.x += Math.sin(e.swayPhase) * e.sway;
    e.x = Math.max(0, Math.min(W - e.w, e.x));

    // 敌人在画布上半部分时周期性射击
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 0 && e.y < H * 0.6) {
      e.shootTimer = 90 + Math.random() * 60;
      bullets.push({
        x: e.x + e.w/2, y: e.y + e.h,
        vx: 0, vy: 4 + wave * 0.2, // 敌方子弹速度随波数增加
        w: 3, h: 10, color: '#f44', damage: 0, isEnemy: true
      });
    }
  });

  // --- 碰撞检测：玩家子弹击中敌人 ---
  bullets.forEach(b => {
    if (b.isEnemy) return;
    enemies.forEach(e => {
      if (b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
        e.hp -= b.damage;
        b.vy = 0; b.y = -100; // 标记子弹为待移除
        createExplosion(b.x, b.y, '#ff0', 5);
        if (e.hp <= 0) {
          score += e.score;
          createExplosion(e.x+e.w/2, e.y+e.h/2, e.color, 20);
          spawnPowerUp(e.x + e.w/2, e.y + e.h/2); // 击杀掉落道具
          updateUI();
        }
      }
    });
  });
  enemies = enemies.filter(e => e.hp > 0);

  // --- 碰撞检测：敌方子弹击中玩家 ---
  bullets.forEach(b => {
    if (!b.isEnemy) return;
    if (b.x > player.x-player.w/2 && b.x < player.x+player.w/2 &&
        b.y > player.y-player.h/2 && b.y < player.y+player.h/2) {
      b.y = H + 100;
      hitPlayer();
    }
  });

  // --- 碰撞检测：敌人撞到玩家 ---
  enemies.forEach(e => {
    if (e.x < player.x+player.w/2 && e.x+e.w > player.x-player.w/2 &&
        e.y < player.y+player.h/2 && e.y+e.h > player.y-player.h/2) {
      e.hp = 0;
      createExplosion(e.x+e.w/2, e.y+e.h/2, e.color, 15);
      hitPlayer();
    }
  });
  enemies = enemies.filter(e => e.hp > 0);
  enemies = enemies.filter(e => e.y < H + 50); // 移除超出底部的敌人

  // --- 道具拾取 ---
  powerUps.forEach(p => { p.y += p.vy; });
  powerUps.forEach(p => {
    if (Math.abs(p.x - player.x) < 25 && Math.abs(p.y - player.y) < 25) {
      if (p.type === 'power') { player.power = Math.min(3, player.power + 1); } // 火力+1（最高3级）
      else { lives = Math.min(5, lives + 1); updateUI(); } // 生命+1（最高5）
      createExplosion(p.x, p.y, p.type==='power'?'#0f0':'#f0f', 10);
      p.y = H + 100; // 标记为待移除
    }
  });
  powerUps = powerUps.filter(p => p.y < H + 20);

  // --- 更新粒子效果，逐渐减速并消亡 ---
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.97; p.vy *= 0.97; });
  particles = particles.filter(p => p.life > 0);
}

// ==================== 玩家受伤处理 ====================
function hitPlayer() {
  lives--;
  player.power = Math.max(1, player.power - 1); // 受伤降一级火力
  createExplosion(player.x, player.y, '#0af', 25);
  updateUI();
  if (lives <= 0) {
    // 游戏结束，显示结算画面
    gameState = 'over';
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h2>游戏结束</h2>
      <h1 style="font-size:36px">得分: ${score}</h1>
      <p>你坚持到了第 ${wave} 波</p>
      <button class="start-btn" onclick="location.reload()">再来一次</button>
    `;
  }
}

// ==================== 绘制函数 ====================
function draw() {
  // 绘制深色背景
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // 绘制背景星星（亮度随大小变化）
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + s.s/3})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });

  // --- 绘制玩家飞船 ---
  ctx.save();
  ctx.translate(player.x, player.y);
  // 飞船主体（五边形）
  ctx.fillStyle = '#0af';
  ctx.beginPath();
  ctx.moveTo(0, -player.h/2);
  ctx.lineTo(-player.w/2, player.h/2);
  ctx.lineTo(-player.w/4, player.h/3);
  ctx.lineTo(player.w/4, player.h/3);
  ctx.lineTo(player.w/2, player.h/2);
  ctx.closePath();
  ctx.fill();
  // 引擎火焰（随机闪烁效果）
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.moveTo(-8, player.h/3);
  ctx.lineTo(0, player.h/2 + 6 + Math.random()*6);
  ctx.lineTo(8, player.h/3);
  ctx.closePath();
  ctx.fill();
  // 火力等级指示灯（2级绿色，3级黄色）
  if (player.power >= 2) {
    ctx.fillStyle = player.power === 3 ? '#ff0' : '#0f8';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // --- 绘制子弹（带发光效果）---
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = b.color;
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
    ctx.shadowBlur = 0;
  });

  // --- 绘制敌人（六边形+血条）---
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = e.color;
    // 六边形形状
    ctx.beginPath();
    let cx = e.x + e.w/2, cy = e.y + e.h/2, r = e.w/2;
    for (let i = 0; i < 6; i++) {
      let a = Math.PI/3 * i - Math.PI/2;
      let px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // 血量条（多血量敌人显示）
    if (e.maxHp > 1) {
      let bw = e.w, bh = 4;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x, e.y - 8, bw, bh);
      ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#0f0' : '#f80'; // 血量过半绿色，否则橙色
      ctx.fillRect(e.x, e.y - 8, bw * (e.hp/e.maxHp), bh);
    }
  });

  // --- 绘制道具（带发光圆圈+标识文字）---
  powerUps.forEach(p => {
    ctx.fillStyle = p.type === 'power' ? '#0f0' : '#f0f';
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.type === 'power' ? '#0f0' : '#f0f';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type === 'power' ? 'P' : '+', p.x, p.y); // P=火力，+=回血
  });

  // --- 绘制粒子（透明度随生命值衰减）---
  particles.forEach(p => {
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ==================== 游戏主循环 ====================
function loop() {
  if (gameState !== 'playing') return;
  update(); // 更新游戏状态
  draw();   // 绘制画面
  requestAnimationFrame(loop); // 请求下一帧
}
</script>

</body>
</html>
