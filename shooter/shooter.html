<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>星际射击</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 40px rgba(0,150,255,0.3); }
  #ui { position: absolute; top: 20px; color: #fff; text-align: center; pointer-events: none; width: 100%; }
  #score { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #0af; }
  #lives { font-size: 18px; margin-top: 6px; color: #f55; }
  #level { font-size: 16px; margin-top: 4px; color: #0f8; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.75); color: #fff; z-index: 10;
  }
  #overlay h1 { font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px #0af; }
  #overlay h2 { font-size: 28px; margin-bottom: 20px; color: #f55; }
  #overlay p { font-size: 16px; color: #aaa; margin: 4px 0; }
  #overlay .start-btn {
    margin-top: 30px; padding: 14px 40px; font-size: 20px; cursor: pointer;
    background: linear-gradient(135deg, #0af, #06f); border: none; border-radius: 30px;
    color: #fff; pointer-events: auto; transition: transform 0.2s;
  }
  #overlay .start-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">得分: 0</div>
  <div id="lives">❤ ❤ ❤</div>
  <div id="level">第 1 波</div>
</div>

<div id="overlay">
  <h1>星际射击</h1>
  <p>← → 或 A D 移动</p>
  <p>空格键 射击</p>
  <p>消灭敌人，生存下去！</p>
  <button class="start-btn" id="startBtn">开始游戏</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 600, H = 750;
canvas.width = W; canvas.height = H;

const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');

// Game state
let player, bullets, enemies, particles, stars, powerUps;
let score, lives, wave, enemySpawnTimer, gameState;
let shootCooldown, shootInterval;
let keys = {};

function init() {
  player = { x: W/2, y: H - 60, w: 40, h: 40, speed: 6, power: 1 };
  bullets = []; enemies = []; particles = []; powerUps = [];
  stars = Array.from({length: 120}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    s: Math.random()*2+0.5, sp: Math.random()*2+1
  }));
  score = 0; lives = 3; wave = 1;
  enemySpawnTimer = 0; shootCooldown = 0; shootInterval = 12;
  gameState = 'playing';
  updateUI();
}

function updateUI() {
  scoreEl.textContent = '得分: ' + score;
  livesEl.textContent = '❤ '.repeat(lives).trim();
  levelEl.textContent = '第 ' + wave + ' 波';
}

// Input
document.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='Space') e.preventDefault(); });
document.addEventListener('keyup', e => keys[e.code] = false);

// Start
document.getElementById('startBtn').addEventListener('click', () => {
  overlay.style.display = 'none';
  init();
  loop();
});

// Enemy types
function spawnEnemy() {
  const types = [
    { w:30, h:30, hp:1, speed:2, color:'#f55', score:10 },
    { w:40, h:40, hp:2, speed:1.5, color:'#fa0', score:25 },
    { w:50, h:50, hp:4, speed:1, color:'#f0f', score:50 },
  ];
  // Higher waves have harder enemies
  let maxType = Math.min(types.length, Math.floor(wave / 2) + 1);
  let t = types[Math.floor(Math.random() * maxType)];
  let ex = Math.random() * (W - t.w);
  // Sometimes spawn in formation
  enemies.push({
    x: ex, y: -t.h, w: t.w, h: t.h, hp: t.hp, maxHp: t.hp,
    speed: t.speed + wave * 0.1, color: t.color, score: t.score,
    shootTimer: Math.random() * 120 + 60,
    sway: Math.random() * 2 - 1, swayPhase: Math.random() * Math.PI * 2
  });
}

function spawnPowerUp(x, y) {
  if (Math.random() > 0.15) return;
  powerUps.push({ x, y, w: 20, h: 20, type: Math.random() < 0.5 ? 'power' : 'heal', vy: 1.5 });
}

function createExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = Math.random() * 4 + 1;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 30 + Math.random()*20, maxLife: 50, size: Math.random()*3+1, color
    });
  }
}

function shoot() {
  if (shootCooldown > 0) return;
  shootCooldown = shootInterval;
  let bx = player.x, by = player.y - player.h/2;
  if (player.power === 1) {
    bullets.push({ x: bx, y: by, vx: 0, vy: -8, w: 4, h: 12, color: '#0ff', damage: 1 });
  } else if (player.power === 2) {
    bullets.push({ x: bx-8, y: by, vx: 0, vy: -8, w: 4, h: 12, color: '#0ff', damage: 1 });
    bullets.push({ x: bx+8, y: by, vx: 0, vy: -8, w: 4, h: 12, color: '#0ff', damage: 1 });
  } else {
    bullets.push({ x: bx, y: by, vx: 0, vy: -8, w: 5, h: 14, color: '#ff0', damage: 2 });
    bullets.push({ x: bx-14, y: by+6, vx: -1, vy: -7.5, w: 4, h: 10, color: '#0ff', damage: 1 });
    bullets.push({ x: bx+14, y: by+6, vx: 1, vy: -7.5, w: 4, h: 10, color: '#0ff', damage: 1 });
  }
}

function update() {
  if (gameState !== 'playing') return;

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));

  // Auto-shoot when holding space
  if (keys['Space']) shoot();
  if (shootCooldown > 0) shootCooldown--;

  // Stars
  stars.forEach(s => { s.y += s.sp; if (s.y > H) { s.y = 0; s.x = Math.random()*W; } });

  // Bullets
  bullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
  bullets = bullets.filter(b => b.y > -20 && b.y < H+20 && b.x > -20 && b.x < W+20);

  // Enemy spawn
  enemySpawnTimer--;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = Math.max(20, 60 - wave * 3);
  }

  // Wave progression
  if (score > wave * 200) {
    wave++;
    updateUI();
  }

  // Enemies
  enemies.forEach(e => {
    e.y += e.speed;
    e.swayPhase += 0.03;
    e.x += Math.sin(e.swayPhase) * e.sway;
    e.x = Math.max(0, Math.min(W - e.w, e.x));

    // Enemy shooting
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 0 && e.y < H * 0.6) {
      e.shootTimer = 90 + Math.random() * 60;
      bullets.push({
        x: e.x + e.w/2, y: e.y + e.h,
        vx: 0, vy: 4 + wave * 0.2,
        w: 3, h: 10, color: '#f44', damage: 0, isEnemy: true
      });
    }
  });

  // Collision: player bullets -> enemies
  bullets.forEach(b => {
    if (b.isEnemy) return;
    enemies.forEach(e => {
      if (b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
        e.hp -= b.damage;
        b.vy = 0; b.y = -100; // mark for removal
        createExplosion(b.x, b.y, '#ff0', 5);
        if (e.hp <= 0) {
          score += e.score;
          createExplosion(e.x+e.w/2, e.y+e.h/2, e.color, 20);
          spawnPowerUp(e.x + e.w/2, e.y + e.h/2);
          updateUI();
        }
      }
    });
  });
  enemies = enemies.filter(e => e.hp > 0);

  // Collision: enemy bullets -> player
  bullets.forEach(b => {
    if (!b.isEnemy) return;
    if (b.x > player.x-player.w/2 && b.x < player.x+player.w/2 &&
        b.y > player.y-player.h/2 && b.y < player.y+player.h/2) {
      b.y = H + 100;
      hitPlayer();
    }
  });

  // Collision: enemies -> player
  enemies.forEach(e => {
    if (e.x < player.x+player.w/2 && e.x+e.w > player.x-player.w/2 &&
        e.y < player.y+player.h/2 && e.y+e.h > player.y-player.h/2) {
      e.hp = 0;
      createExplosion(e.x+e.w/2, e.y+e.h/2, e.color, 15);
      hitPlayer();
    }
  });
  enemies = enemies.filter(e => e.hp > 0);
  enemies = enemies.filter(e => e.y < H + 50);

  // Power-ups
  powerUps.forEach(p => { p.y += p.vy; });
  powerUps.forEach(p => {
    if (Math.abs(p.x - player.x) < 25 && Math.abs(p.y - player.y) < 25) {
      if (p.type === 'power') { player.power = Math.min(3, player.power + 1); }
      else { lives = Math.min(5, lives + 1); updateUI(); }
      createExplosion(p.x, p.y, p.type==='power'?'#0f0':'#f0f', 10);
      p.y = H + 100;
    }
  });
  powerUps = powerUps.filter(p => p.y < H + 20);

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.97; p.vy *= 0.97; });
  particles = particles.filter(p => p.life > 0);
}

function hitPlayer() {
  lives--;
  player.power = Math.max(1, player.power - 1);
  createExplosion(player.x, player.y, '#0af', 25);
  updateUI();
  if (lives <= 0) {
    gameState = 'over';
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h2>游戏结束</h2>
      <h1 style="font-size:36px">得分: ${score}</h1>
      <p>你坚持到了第 ${wave} 波</p>
      <button class="start-btn" onclick="location.reload()">再来一次</button>
    `;
  }
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + s.s/3})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);
  // Ship body
  ctx.fillStyle = '#0af';
  ctx.beginPath();
  ctx.moveTo(0, -player.h/2);
  ctx.lineTo(-player.w/2, player.h/2);
  ctx.lineTo(-player.w/4, player.h/3);
  ctx.lineTo(player.w/4, player.h/3);
  ctx.lineTo(player.w/2, player.h/2);
  ctx.closePath();
  ctx.fill();
  // Engine glow
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.moveTo(-8, player.h/3);
  ctx.lineTo(0, player.h/2 + 6 + Math.random()*6);
  ctx.lineTo(8, player.h/3);
  ctx.closePath();
  ctx.fill();
  // Power indicator
  if (player.power >= 2) {
    ctx.fillStyle = player.power === 3 ? '#ff0' : '#0f8';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = b.color;
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = e.color;
    // Hexagonal enemy
    ctx.beginPath();
    let cx = e.x + e.w/2, cy = e.y + e.h/2, r = e.w/2;
    for (let i = 0; i < 6; i++) {
      let a = Math.PI/3 * i - Math.PI/2;
      let px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // HP bar
    if (e.maxHp > 1) {
      let bw = e.w, bh = 4;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x, e.y - 8, bw, bh);
      ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#0f0' : '#f80';
      ctx.fillRect(e.x, e.y - 8, bw * (e.hp/e.maxHp), bh);
    }
  });

  // Power-ups
  powerUps.forEach(p => {
    ctx.fillStyle = p.type === 'power' ? '#0f0' : '#f0f';
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.type === 'power' ? '#0f0' : '#f0f';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type === 'power' ? 'P' : '+', p.x, p.y);
  });

  // Particles
  particles.forEach(p => {
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function loop() {
  if (gameState !== 'playing') return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
